        // 計算距離公式 (km)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

                    distText = `<span class="text-blue-600 font-bold"><i class="fas fa-walking"></i> ${d.toFixed(2)} km</span>`;
                }

                return `
                <div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <span class="px-2 py-1 bg-blue-100 text-blue-600 text-xs font-bold rounded">${toilet.公廁類別}</span>
                            ${distText}
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2 truncate">${toilet.公廁名稱}</h3>
                        <p class="text-gray-500 text-sm mb-4 flex items-center gap-2">
                            <i class="fas fa-map-marker-alt text-red-400"></i> ${toilet.地址或地點描述}
                        </p>
                        <hr class="mb-4">
                        <div class="flex justify-between items-center text-xs">
                            <span class="text-gray-400"><i class="fas fa-building"></i> ${toilet.權管單位}</span>
                            <a href="https://www.google.com/maps/dir/?api=1&destination=${toilet.緯度},${toilet.經度}" target="_blank" 
                               class="text-blue-500 hover:text-blue-700 font-bold flex items-center gap-1">
                               導航 <i class="fas fa-external-link-alt"></i>
                            </a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // 渲染最近推薦卡片
        function renderNearby(toilet) {
            const nearbySection = document.getElementById('nearbySection');
            const container = document.getElementById('nearbyContainer');
            const dist = getDistance(userCoords.lat, userCoords.lng, toilet.緯度, toilet.經度);
            
            nearbySection.classList.remove('hidden');
            container.innerHTML = `
                <div class="recommend-gradient p-6 rounded-2xl text-white shadow-xl flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <div class="bg-white/20 inline-block px-3 py-1 rounded-full text-xs mb-2">最佳推薦：距離最短</div>
                        <h3 class="text-2xl font-bold">${toilet.公廁名稱}</h3>
                        <p class="opacity-90"><i class="fas fa-map-marker-alt"></i> ${toilet.地址或地點描述}</p>
                    </div>
                    <div class="text-center md:text-right">
                        <div class="text-3xl font-black">${dist.toFixed(2)} km</div>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${toilet.緯度},${toilet.經度}" target="_blank"
                           class="mt-2 inline-block bg-white text-blue-600 px-6 py-2 rounded-full font-bold hover:bg-blue-50 transition">
                           立即前往
                        </a>
                    </div>
                </div>
            `;
        }

        // 取得位置功能
        function getLocation() {
            const status = document.getElementById('locationStatus');
            if (navigator.geolocation) {
                status.innerHTML = `<p class="text-sm text-gray-500">定位狀態</p><p class="text-md font-bold text-blue-500 italic">定位中...</p>`;
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userCoords = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude
                        };
                        status.innerHTML = `<p class="text-sm text-gray-500">定位狀態</p><p class="text-md font-bold text-green-600">已成功定位</p>`;
                        renderToilets(toiletData);
                    },
                    (error) => {
                        status.innerHTML = `<p class="text-sm text-gray-500">定位狀態</p><p class="text-md font-bold text-red-500">定位失敗 (請開啟權限)</p>`;
                    }
                );
            }
        }

        // 搜尋功能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = toiletData.filter(item => 
                item.公廁名稱.toLowerCase().includes(keyword) || 
                item.地址或地點描述.toLowerCase().includes(keyword)
            );
            renderToilets(filtered);
        });

        // 啟動
        window.onload = () => {
            renderToilets(toiletData);
            getLocation(); // 頁面載入自動詢問定位
        };
    </script>
</body>
</html>
